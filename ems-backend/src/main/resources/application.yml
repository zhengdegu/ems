server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:./ems.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT
ems:
  jwt:
    secret: ems-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
    expiration: 86400000

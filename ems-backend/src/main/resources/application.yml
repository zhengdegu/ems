server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ems?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT
ems:
  jwt:
    secret: ems-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
    expiration: 86400000
  upload:
    path: ./uploads
  simulator:
    enabled: false
  mqtt:
    enabled: false  # 默认关闭，有MQTT Broker时改为true
    broker-url: tcp://localhost:1883
    client-id: ems-server
    username:
    password:
    topic: ems/device/#

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
